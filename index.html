<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>灵动起始页</title>
  <style>
    /* ============================================
       灵动起始页 - 样式表
       功能：iOS风格的桌面启动页，支持拖拽、文件夹、搜索、云同步
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none; 
      user-select: none;
      -webkit-user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #0b1220;
    }
    :root {
      --icon-size: clamp(46px, 12vw, 58px);
      --icon-radius: clamp(12px, 3vmin, 18px);
      --grid-gap: 18px 14px;
      --grid-columns: 5;
      --page-padding: 0 20px 32px;
      --header-time-size: clamp(42px, 12vw, 52px);
      --header-date-size: clamp(13px, 3vw, 15px);
      --label-font-size: clamp(10px, 2.2vw, 11px);
      --dock-height: clamp(62px, 10vh, 76px);
      --dock-max-width: 440px;
      --search-max-width: 440px;
      --quote-max-width: 440px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --panel-bg: rgba(8, 14, 26, 0.96);
      --panel-border: rgba(255, 255, 255, 0.12);
      --btn-bg: rgba(255, 255, 255, 0.14);
      --btn-hover-bg: rgba(255, 255, 255, 0.22);
      --btn-active-bg: rgba(255, 255, 255, 0.28);
      --primary-gradient: linear-gradient(135deg, #5b8cff, #7c5cff);
      --primary-hover-gradient: linear-gradient(135deg, #6a99ff, #8b6dff);
      --success-color: #48bb78;
      --danger-color: #f56565;
      --swap-highlight: rgba(255, 255, 255, 0.25);
      --insert-placeholder-bg: rgba(255, 255, 255, 0.15);
      --exchange-shadow: 0 4px 20px rgba(91, 140, 255, 0.4);
    }
    body { color: #fff; position: relative; overflow: hidden; }
    .wallpaper {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(94,129,244,.34), transparent 35%), radial-gradient(circle at 80% 15%, rgba(62,226,173,.18), transparent 30%), radial-gradient(circle at 50% 80%, rgba(233,124,255,.18), transparent 35%), linear-gradient(180deg, #223352 0%, #132038 42%, #0b1426 100%);
      z-index: 0; transition: background 0.3s ease;
    }
    .wallpaper::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.07), rgba(255,255,255,.01) 18%, rgba(0,0,0,.08) 100%);
      pointer-events: none;
    }
    .app-shell {
      position: relative; z-index: 1; width: 100%; height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
      padding: 0 var(--safe-right) 0 var(--safe-left);
    }
    .delete-zone {
      position: fixed; top: calc(var(--safe-top) + 6px); left: 50%;
      transform: translateX(-50%) translateY(-120%);
      width: clamp(70px, 12vw, 90px); height: clamp(70px, 12vw, 90px);
      border-radius: 50%; background: rgba(18, 20, 27, .25);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      z-index: 3000; opacity: 0; pointer-events: none;
      transition: transform .28s cubic-bezier(.2,.8,.2,1), opacity .22s ease, background .18s ease, border-color .18s ease;
      box-shadow: 0 16px 34px rgba(0,0,0,.2);
    }
    .delete-zone.active { transform: translateX(-50%) translateY(0); opacity: 1; }
    .delete-zone.hover { background: rgba(214, 46, 46, .86); border-color: rgba(255,255,255,.15); }
    .delete-zone .iconify { font-size: 24px; }
    .delete-zone span { font-size: 11px; font-weight: 600; letter-spacing: .2px; text-align: center; line-height: 1; }
    .top-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--btn-bg);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff;
      transition: background .18s ease, transform .15s ease; flex-shrink: 0;
    }
    .top-btn:hover, .top-btn:focus-visible { background: var(--btn-hover-bg); outline: 2px solid rgba(255,255,255,0.3); outline-offset: 2px; }
    .top-btn:active { transform: scale(.95); }
    .top-btn .iconify { font-size: 18px; }
    .top-actions { position: absolute; top: calc(var(--safe-top) + 12px); right: 16px; z-index: 20; display: none; }
    .header-section {
      width: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      color: #fff; padding: calc(var(--safe-top) + 12px) 20px 0; text-shadow: 0 2px 8px rgba(0,0,0,.22); z-index: 5;
    }
    .header-time { font-size: var(--header-time-size); font-weight: 200; line-height: 1; letter-spacing: -1px; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
    .header-date { font-size: var(--header-date-size); opacity: .96; margin-bottom: 16px; }
    .quote-container { width: 90%; max-width: var(--quote-max-width); margin-bottom: 14px; min-height: 22px; }
    .quote-display { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
    .quote-text-wrap { flex: 0 1 auto; max-width: 85%; overflow: hidden; position: relative; }
    .quote-text { color: rgba(255,255,255,.96); font-size: 14px; line-height: 18px; white-space: nowrap; display: inline-block; }
    .quote-text.scroll { animation: quoteScroll 10s linear infinite; }
    .quote-text-wrap:hover .quote-text.scroll { animation-play-state: paused; }
    @keyframes quoteScroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    .quote-edit-btn { display: inline-flex; align-items: center; cursor: pointer; opacity: .82; transition: opacity .18s ease; flex-shrink: 0; }
    .quote-edit-btn:hover { opacity: 1; }
    .quote-edit-mode { display: none; width: 100%; gap: 8px; align-items: center; }
    .quote-edit-mode.active { display: flex; }
    .quote-input { flex: 1; height: 36px; border: none; outline: none; border-radius: 10px; padding: 0 12px; background: var(--btn-bg); color: #fff; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-size: 13px; border: 1px solid var(--panel-border); }
    .quote-input::placeholder { color: rgba(255,255,255,.6); }
    .quote-action-btn { height: 36px; border: none; outline: none; padding: 0 12px; border-radius: 10px; background: var(--btn-bg); color: #fff; cursor: pointer; font-size: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: background .18s ease; }
    .quote-action-btn:hover, .quote-action-btn:focus-visible { background: var(--btn-hover-bg); outline: 2px solid rgba(255,255,255,0.3); }
    .search-bar {
      width: 90%; max-width: var(--search-max-width); height: 40px; display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 0 14px; margin-bottom: 28px; border-radius: 20px; background: rgba(255,255,255,.16);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(0,0,0,.08); position: relative; border: 1px solid var(--panel-border);
    }
    .search-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .search-icon { font-size: 18px; color: white; flex-shrink: 0; cursor: pointer; transition: transform .18s ease; -webkit-tap-highlight-color: transparent; outline: none; }
    .search-icon:active { transform: scale(.92); }
    .search-icon:focus { outline: none; }
    .search-input { flex: 1; min-width: 0; border: none; outline: none; background: transparent; color: rgba(255,255,255,.95); font-size: 14px; }
    .search-input::placeholder { color: rgba(255,255,255,.72); }
    .search-actions { display: flex; gap: 10px; opacity: .95; flex-shrink: 0; }
    .search-actions .iconify { font-size: 17px; color: rgba(255,255,255,.92); }
    .engine-panel {
      position: absolute; top: calc(100% + 8px); left: 0; width: 100%; border-radius: 16px;
      background: rgba(30, 30, 40, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); z-index: 100; opacity: 0; pointer-events: none;
      transform: translateY(-8px); transition: all 0.25s ease; overflow: hidden; border: 1px solid var(--panel-border);
    }
    .engine-panel.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .engine-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
    .engine-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 8px; border-radius: 12px; cursor: pointer; transition: background .18s ease, transform .15s ease;
      background: transparent; position: relative;
    }
    .engine-item:hover, .engine-item:focus-visible { background: var(--btn-hover-bg); transform: scale(1.05); outline: none; }
    .engine-item.add-btn:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }

    .engine-item .iconify { font-size: 22px; color: #fff; flex-shrink: 0; }
    .engine-name { font-size: 12px; color: #fff; text-align: center; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .desktop { position: relative; width: 100%; flex: 1; overflow: hidden; perspective: 1200px; }
    .pages-container { display: flex; width: fit-content; height: 100%; transform: translate3d(0,0,0); will-change: transform; transition: transform .42s cubic-bezier(.22,.88,.24,1); }
    .page {
      width: 100vw; height: 100%; padding: var(--page-padding); display: grid;
      grid-template-columns: repeat(var(--grid-columns), 1fr); grid-auto-rows: min-content;
      gap: var(--grid-gap); align-content: start; justify-items: center; position: relative;
      transform-origin: center center; transition: opacity .34s ease, transform .42s cubic-bezier(.22,.88,.24,1), filter .34s ease;
      opacity: .72; filter: saturate(.88); transform: scale(.94) rotateY(9deg); contain: layout style paint;
    }
    .page.page-current { opacity: 1; filter: saturate(1); transform: scale(1) rotateY(0); }
    .page.page-prev { transform: scale(.965) rotateY(8deg); }
    .page.page-next { transform: scale(.965) rotateY(-8deg); }
    .virtual-scroll-spacer { grid-column: 1 / -1; height: var(--spacer-height, 0); pointer-events: none; }
    .app-icon {
      width: var(--icon-size); display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      cursor: pointer; touch-action: none; will-change: transform; position: relative; transition: transform .2s ease, opacity .2s ease;
      outline: none; contain: layout style;
    }
    .app-icon:focus-visible { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 4px; border-radius: 8px; }
    .app-icon:active { transform: scale(.96); }
    .icon-bg {
      width: var(--icon-size); height: var(--icon-size); border-radius: var(--icon-radius); background: rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center; overflow: hidden; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .18s ease, outline .18s ease, box-shadow .18s ease, background .18s ease; position: relative;
    }
    .icon-bg .iconify { font-size: calc(var(--icon-size) * .6); color: #fff; }
    .icon-bg img.custom-icon { width: 100%; height: 100%; object-fit: cover; display: block; }
    .icon-label-wrap { width: 100%; display: flex; justify-content: center; margin-top: 7px; }
    .icon-label { color: #fff; font-size: var(--label-font-size); line-height: 1.25; text-shadow: 0 1px 4px rgba(0,0,0,.2); white-space: nowrap; overflow: visible; max-width: none; width: auto; text-align: center; position: static; left: auto; transform: none; margin: 0; padding: 0 2px; }
    .folder-preview { position: absolute; inset: 8%; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 4px; }
    .folder-preview-cell { border-radius: 6px; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .folder-preview-cell .iconify { font-size: calc(var(--icon-size) * .22); }
    .folder-preview-cell img.custom-icon { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }
    .page-indicators { position: absolute; left: 50%; bottom: calc(10px + var(--safe-bottom)); transform: translateX(-50%); display: flex; gap: 8px; z-index: 6; }
    .indicator-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.36); transition: all .25s ease; cursor: pointer; }
    .indicator-dot:hover, .indicator-dot:focus-visible { transform: scale(1.3); background: rgba(255,255,255,0.6); outline: none; }
    .indicator-dot.active { width: 18px; border-radius: 999px; background: rgba(255,255,255,.96); }
    .dock-wrap { width: 100%; padding: 0 16px calc(12px + var(--safe-bottom)); flex-shrink: 0; display: flex; justify-content: center; position: relative; z-index: 8; }
    .dock {
      width: 100%; max-width: var(--dock-max-width); min-height: var(--dock-height); border-radius: 24px; padding: 10px 14px;
      display: flex; align-items: center; justify-content: flex-start; gap: 9px; background: rgba(255,255,255,.14);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 12px 28px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.10); position: relative; border: 1px solid var(--panel-border);
    }
    .dock .app-icon { width: calc(var(--icon-size) * .92); flex-shrink: 0; }
    .dock .icon-bg { width: calc(var(--icon-size) * .92); height: calc(var(--icon-size) * .92); }
    .dock .icon-label { display: none; }
    .drag-ghost { position: fixed; left: 0; top: 0; z-index: 4000; pointer-events: none; will-change: transform; transform: translate3d(0, 0, 0); backface-visibility: hidden; perspective: 1000px; filter: drop-shadow(0 12px 24px rgba(0,0,0,.28)); }
    .drag-ghost .app-icon { transform: scale(1.06); }
    .drag-ghost .icon-bg img.custom-icon { width: 100%; height: 100%; object-fit: cover; }
    .app-icon.drag-source { opacity: .18 !important; }
    .app-icon.exchange-target .icon-bg { transform: scale(0.9); box-shadow: var(--exchange-shadow); outline: 2px solid rgba(255,255,255,0.4); outline-offset: 2px; }
    .app-icon.merge-hover .icon-bg { outline: 3px solid rgba(255,255,255,.95); outline-offset: 4px; transform: scale(1.12); box-shadow: 0 12px 30px rgba(0,0,0,.18), 0 0 0 12px rgba(255,255,255,.15), inset 0 1px 0 rgba(255,255,255,.08); }
    .app-icon.merge-hover::after { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 12px; font-weight: 600; line-height: 1; padding: 6px 10px; border-radius: 999px; background: rgba(0,0,0,.72); color: #fff; z-index: 100; animation: mergePulse 1.5s ease-in-out infinite; content: "合并"; }
    @keyframes mergePulse { 0%, 100% { opacity: 0.9; transform: translateX(-50%) translateY(0); } 50% { opacity: 1; transform: translateX(-50%) translateY(-2px); } }
    .app-icon.swap-hover .icon-bg { outline: 2px solid var(--swap-highlight); outline-offset: 2px; transform: scale(1.05); }
    .insert-placeholder { width: var(--icon-size); height: var(--icon-size); border-radius: var(--icon-radius); background: var(--insert-placeholder-bg); border: 2px dashed rgba(255,255,255,0.4); backdrop-filter: blur(4px); animation: placeholderPulse 1.2s ease-in-out infinite; pointer-events: none; }
    @keyframes placeholderPulse { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
    .insert-placeholder-gap { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .dock.drag-over { background: rgba(91, 140, 255, 0.25) !important; border-color: rgba(91, 140, 255, 0.6) !important; box-shadow: 0 12px 28px rgba(0,0,0,.15), 0 0 0 3px rgba(91, 140, 255, 0.3), inset 0 1px 0 rgba(255,255,255,.10) !important; }
    .page.drag-over { background: rgba(91, 140, 255, 0.08); border-radius: 20px; }
    .folder-grid.drag-over { background: rgba(91, 140, 255, 0.12); box-shadow: inset 0 0 0 2px rgba(91, 140, 255, 0.4); }
    .folder-modal, .form-modal, .wallpaper-modal, .engine-form-modal, .sync-modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 2500; padding: 20px;
    }
    .folder-modal.active, .form-modal.active, .wallpaper-modal.active, .engine-form-modal.active, .sync-modal.active { display: flex; }
    .folder-content, .form-content, .wallpaper-content, .engine-form-content, .sync-content {
      width: min(560px, 92vw); border-radius: 28px; background: var(--panel-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 18px 40px rgba(0,0,0,.3); overflow: hidden; border: 1px solid var(--panel-border);
    }
    .folder-content { min-height: 320px; max-height: 78vh; display: flex; flex-direction: column; }
    .folder-header, .form-header, .wallpaper-header, .engine-form-header, .sync-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 18px 0; color: #fff; }
    .folder-title, .form-title, .wallpaper-title, .engine-form-title, .sync-title { font-size: 18px; font-weight: 600; }
    .folder-body { padding: 20px; overflow: auto; flex: 1; }
    .folder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; justify-items: center; min-height: 180px; border-radius: 20px; padding: 6px; position: relative; }
    .folder-tip { margin-top: 16px; text-align: center; color: rgba(255,255,255,.78); font-size: 12px; }
    .context-menu {
      position: fixed; min-width: 188px; padding: 8px 0; border-radius: 16px; background: var(--panel-bg);
      color: #fff; box-shadow: 0 18px 40px rgba(0,0,0,.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 3500; opacity: 0; pointer-events: none; transform: scale(.96); transform-origin: top left;
      transition: opacity .18s ease, transform .18s ease; border: 1px solid var(--panel-border);
    }
    .context-menu.active { opacity: 1; pointer-events: auto; transform: scale(1); }
    .context-item { height: 42px; padding: 0 14px; display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; transition: background .18s ease; }
    .context-item:hover, .context-item:focus-visible { background: var(--btn-hover-bg); outline: none; }
    .context-item .iconify { font-size: 18px; }
    .context-item.danger { color: #ff6b6b; }
    .context-divider { height: 1px; margin: 6px 0; background: var(--panel-border); }
    .form-body, .wallpaper-body, .engine-form-body, .sync-body { padding: 18px; }
    .form-row { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; margin-bottom: 8px; opacity: .92; }
    .form-input, .form-select { width: 100%; height: 42px; border: none; outline: none; border-radius: 14px; padding: 0 14px; background: var(--btn-bg); color: #fff; font-size: 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--panel-border); }
    .form-input:focus-visible, .form-select:focus-visible { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 2px; }
    .form-input::placeholder { color: rgba(255,255,255,.6); }
    .icon-input-row { display: flex; gap: 8px; align-items: center; }
    .icon-input-row .form-input { flex: 1; }
    .icon-select-btn { height: 42px; min-width: 42px; border: none; outline: none; border-radius: 14px; background: var(--btn-bg); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .18s ease; flex-shrink: 0; }
    .icon-select-btn:hover, .icon-select-btn:focus-visible { background: var(--btn-hover-bg); outline: 2px solid rgba(255,255,255,0.3); }
    .icon-select-btn .iconify { font-size: 18px; }
    .file-input-wrapper { position: relative; width: 100%; }
    .file-input-wrapper input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .file-input-label { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 42px; border-radius: 14px; background: var(--btn-bg); color: #fff; cursor: pointer; font-size: 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px dashed var(--panel-border); transition: background .18s ease, border-color .18s ease; }
    .file-input-label:hover, .file-input-label:focus-visible { background: var(--btn-hover-bg); border-color: rgba(255,255,255,.2); outline: none; }
    .file-input-label .iconify { font-size: 16px; }
    .form-preview { margin-top: 10px; display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; background: var(--btn-bg); border: 1px solid var(--panel-border); }
    .form-preview-icon { width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.12); overflow: hidden; flex-shrink: 0; }
    .form-preview-icon .iconify { font-size: 30px; color: #fff; }
    .form-preview-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }
    .form-preview-name { font-size: 14px; font-weight: 500; color: #fff; }
    .form-preview-link { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }
    .form-actions, .wallpaper-actions, .engine-form-actions, .sync-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 0 18px 18px; }
    .form-btn { min-width: 84px; height: 40px; border: none; outline: none; border-radius: 14px; padding: 0 16px; cursor: pointer; color: #fff; background: var(--btn-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: background .18s ease, transform .15s ease; font-size: 14px; }
    .form-btn:hover, .form-btn:focus-visible { background: var(--btn-hover-bg); outline: 2px solid rgba(255,255,255,0.3); }
    .form-btn:active { transform: scale(.98); }

  function handleSearchOrUrl(keyword, engine) {
    if (!keyword) return false;
    var trimmedKeyword = keyword.trim(), mainInput = document.getElementById('searchInput'), searchScreenInput = document.getElementById('searchScreenInput');
    if (mainInput) mainInput.disabled = false;
    function isUrl(input) {
      if (!input || typeof input !== 'string') return false;
      var trimmed = input.trim(); if (trimmed === '') return false;
      if (/^https?:\/\//i.test(trimmed)) { try { new URL(trimmed); return true; } catch (e) { return false; } }
      var domainPattern = /^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}(:\d+)?(\/.*)?$/;
      var ipPattern = /^(\d{1,3}\.){3}\d{1,3}(:\d+)?(\/.*)?$/;
      var localhostPattern = /^localhost(:\d+)?(\/.*)?$/i;
      if (domainPattern.test(trimmed) || ipPattern.test(trimmed) || localhostPattern.test(trimmed)) return true;
      if (!trimmed.includes('.') || /[\u4e00-\u9fa5\s]/.test(trimmed)) return false;
      try { new URL('https://' + trimmed); return true; } catch (e) { return false; }
    }
    if (isUrl(trimmedKeyword)) { 
      var url = trimmedKeyword; 
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url; 
      window.open(url, '_blank'); 
      if (mainInput) mainInput.value = ''; 
      if (searchScreenInput) searchScreenInput.value = ''; 
      return true; 
    }
    else {
      if (!engine || !engine.url) engine = searchStore.engines.find(function findDefaultEngine(e) { return e.id === 'preset-2'; }) || searchStore.engines[2];
      var searchUrl = engine.url.replace('%s', encodeURIComponent(trimmedKeyword)); 
      window.open(searchUrl, '_blank');
      if (mainInput) mainInput.value = ''; 
      if (searchScreenInput) searchScreenInput.value = ''; 
      return false;
    }
  }

  function showEngineContextMenu(x, y, engineId) {
    var engine = searchStore.engines.find(function findEngine(e) { return e.id === engineId; });
    if (!engine) return;
    state.engineContextTarget = engine;
    if (refs.engineContextMenu) {
      refs.engineContextMenu.style.visibility = 'hidden';
      refs.engineContextMenu.style.left = '0';
      refs.engineContextMenu.style.top = '0';
      refs.engineContextMenu.classList.add('active');
      var menuRect = refs.engineContextMenu.getBoundingClientRect();
      var menuWidth = menuRect.width;
      var menuHeight = menuRect.height;
      var viewportWidth = window.innerWidth;
      var viewportHeight = window.innerHeight;
      var safeMargin = 8;
      var left = x;
      if (left + menuWidth > viewportWidth - safeMargin) {
        left = Math.max(x - menuWidth, safeMargin);
      } else {
        left = Math.max(left, safeMargin);
      }
      var top = y;
      if (top + menuHeight > viewportHeight - safeMargin) {
        top = Math.max(y - menuHeight, safeMargin);
      } else {
        top = Math.max(top, safeMargin);
      }
      refs.engineContextMenu.style.left = left + 'px';
      refs.engineContextMenu.style.top = top + 'px';
      refs.engineContextMenu.style.visibility = 'visible';

  function updateSyncTimeInfo() {
    var lastSync = syncStore.config.lastSyncTime, 
        lastInfoEl = document.getElementById('lastSyncInfo'), 
        nextInfoEl = document.getElementById('nextSyncInfo');
    if (lastSync && lastInfoEl) lastInfoEl.textContent = '上次同步: ' + new Date(lastSync).toLocaleString('zh-CN'); 
    else if (lastInfoEl) lastInfoEl.textContent = '尚未进行同步';
    var intervalSelect = document.getElementById('syncIntervalSelect'), 
        interval = intervalSelect ? parseInt(intervalSelect.value) || 0 : 0;
    if (nextInfoEl) { 
      if (interval > 0 && lastSync) { 
        var nextSync = new Date(lastSync); 
        nextSync.setDate(nextSync.getDate() + interval); 
        var diffHours = Math.round((nextSync - new Date()) / (1000 * 60 * 60)); 
        if (diffHours > 24) nextInfoEl.textContent = '预计下次同步: ' + Math.ceil(diffHours / 24) + '天后'; 
        else if (diffHours > 0) nextInfoEl.textContent = '预计下次同步: ' + diffHours + '小时后'; 
        else nextInfoEl.textContent = '预计下次同步: 即将进行'; 
      } else if (interval > 0) nextInfoEl.textContent = '预计下次同步: 数据变更后'; 
      else nextInfoEl.textContent = '自动同步已关闭'; 
    }
  }

      if (e.target === refs.wallpaperModal) closeWallpaperModal();
    }, { passive: true });
    
    var blankClickTimer = null;
    document.addEventListener('click', function blankClickHandler(e) {
      var isAnyModalActive = (refs.folderModal && refs.folderModal.classList.contains('active')) || 
                             (refs.formModal && refs.formModal.classList.contains('active')) || 
                             (refs.contextMenu && refs.contextMenu.classList.contains('active')) || 
                             (refs.wallpaperModal && refs.wallpaperModal.classList.contains('active')) || 
                             (refs.engineFormModal && refs.engineFormModal.classList.contains('active')) || 
                             (refs.syncModal && refs.syncModal.classList.contains('active')) || 
                             (refs.searchScreen && refs.searchScreen.classList.contains('active'));
      if (isAnyModalActive) return;
      var interactive = e.target.closest('.app-icon, .dock, .top-actions, .search-bar, .quote-edit-btn, .quote-action-btn, .page-indicators, .delete-zone');
      if (interactive) return; 
      if (!refs.desktop || !refs.desktop.contains(e.target)) return; 
      if (blankClickTimer) return;
      var clickX = e.clientX, screenWidth = window.innerWidth;
      if (clickX < screenWidth / 2) { 
        if (appStore.currentPage > 0) pageManager.turnTo(appStore.currentPage - 1); 
      } else { 
        if (appStore.currentPage < appStore.getPageCount() - 1) pageManager.turnTo(appStore.currentPage + 1); 
      }
      blankClickTimer = setTimeout(function blankClickTimeout() { blankClickTimer = null; }, 300);
    });
    
    safeBind(refs.folderCloseBtn, 'click', closeFolder);
    safeBind(refs.engineFormCloseBtn, 'click', closeEngineFormModal); 
    safeBind(refs.engineFormCancelBtn, 'click', closeEngineFormModal); 
    safeBind(refs.engineFormSaveBtn, 'click', saveCustomEngine);
    safeBind(refs.searchCloseBtn, 'click', closeSearchScreen);
    
    document.addEventListener('click', function engineIconClickHandler(e) {
      var engineIcon = e.target.closest('#engineIcon');
      if (engineIcon) {
        e.preventDefault();
        e.stopPropagation();
        toggleEnginePanel();
        return;
      }
      var searchScreenEngineIcon = e.target.closest('#searchScreenEngineIcon');
      if (searchScreenEngineIcon) {
        e.preventDefault();
        e.stopPropagation();
        toggleSearchScreenEnginePanel();
        return;
      }
    });
    
    if (refs.searchScreenBody) {
      refs.searchScreenBody.addEventListener('click', function suggestClickHandler(e) {
        var arrowBtn = e.target.closest('.suggest-arrow');
        if (arrowBtn) {
          var text = arrowBtn.dataset.text;
          if (text && refs.searchScreenInput) {
            refs.searchScreenInput.value = text;
            refs.searchScreenInput.focus();
            refs.searchScreenInput.setSelectionRange(text.length, text.length);
          }
          e.stopPropagation();
          return;
        }
        var suggestItem = e.target.closest('.suggest-item');
        if (suggestItem) {
          var text = suggestItem.dataset.text;
          if (text) {
            searchStore.addHistory(text);
            handleSearchOrUrl(text, searchStore.currentEngine);
            closeSearchScreen();
          }
          return;
        }
        var clearHistoryBtn = e.target.closest('[data-action="clear-history"]');
        if (clearHistoryBtn) { searchStore.clearHistory(); showToast('搜索历史已清除'); }
      });
    }
    
    if (refs.enginePanel) {
      refs.enginePanel.addEventListener('click', function enginePanelClickHandler(e) {
        if (engineLongPressState.isLongPress) return;
        var engineItem = e.target.closest('.engine-item[data-engine-id]');
        if (engineItem) { var engineId = engineItem.dataset.engineId; switchEngine(engineId); }
        var addBtn = e.target.closest('[data-action="add-engine"]');
        if (addBtn) openEngineFormModal();
      });
    }
    
    if (refs.searchScreenEnginePanel) {
      refs.searchScreenEnginePanel.addEventListener('click', function searchEnginePanelClickHandler(e) {
        if (engineLongPressState.isLongPress) return;
        var engineItem = e.target.closest('.engine-item[data-engine-id]');
        if (engineItem) { var engineId = engineItem.dataset.engineId; switchEngine(engineId); }
        var addBtn = e.target.closest('[data-action="add-engine"]');
        if (addBtn) openEngineFormModal();
      });
    }
  }

  // ==================== 页面滑动 ====================
  function setupPageSwipe() {
    var startX = 0, startY = 0, tracking = false; 
    if (!refs.desktop) return;
    refs.desktop.addEventListener('pointerdown', function swipePointerdownHandler(e) { 
      if (e.target.closest('.app-icon')) return; 
      startX = e.clientX; 
      startY = e.clientY; 
      tracking = true; 
    }, { passive: true });
    refs.desktop.addEventListener('pointerup', function swipePointerupHandler(e) { 
      if (!tracking || dragStore.active) return; 
      tracking = false; 
      var dx = e.clientX - startX, dy = e.clientY - startY; 
      if (Math.abs(dx) < 36 || Math.abs(dy) > Math.abs(dx) * 0.8) return; 
      if (dx < 0 && appStore.currentPage < appStore.getPageCount() - 1) pageManager.turnTo(appStore.currentPage + 1); 
      else if (dx > 0 && appStore.currentPage > 0) pageManager.turnTo(appStore.currentPage - 1); 
    }, { passive: false });
  }

  // ==================== 时间更新 ====================
  function updateTime() { 
    if (!refs.bigTime) return; 
    var now = new Date(), h = String(now.getHours()).padStart(2, '0'), m = String(now.getMinutes()).padStart(2, '0'); 
    refs.bigTime.textContent = h + ':' + m; 
  }
  function updateDate() { 
    if (!refs.headerDate) return; 
    var now = new Date(), weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六']; 
    refs.headerDate.textContent = (now.getMonth() + 1) + '月' + now.getDate() + '日 ' + weekdays[now.getDay()]; 
  }

  // ==================== 初始化 ====================
  function init() {
    try {
      storageAdapter.checkExtensionEnvironment();
      resolveRefs();
      dragStore.init();
      syncStore.load();
      layoutStore.init();
      loadWallpaper();
      initWallpaperEvents();
      initIconSelectEvent();
      setupSearch();
      setupPageSwipe();
      searchStore.loadCustomEngines().then(function loadEnginesThen() {
        appStore.load();
      }).catch(function loadEnginesCatch() {
        appStore.load();
      });
      updateTime(); 
      updateDate();
      setInterval(updateTime, 1000);
      setInterval(updateDate, 60000);
      bindEvents();
      if (window.Iconify) { try { Iconify.scan(document.body); } catch (_) {} }
      window.addEventListener('load', function windowLoadHandler() { 
        layoutStore.refresh(); 
        if (window.Iconify) Iconify.scan(document.body); 
      });
      window.addEventListener('orientationchange', function orientationchangeHandler() { 
        setTimeout(function orientationTimeout() { layoutStore.refresh(); }, 100); 
      });
    } catch (error) { showToast('初始化失败: ' + error.message); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); 
  else init();
})();
  </script>
</body>
</html>
