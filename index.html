<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>灵动起始页 · 优雅搜索</title>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none; 
      user-select: none;
      -webkit-user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        sans-serif;
      background: #0b1220;
    }
    :root {
      --icon-size: clamp(46px, 12vw, 58px);
      --icon-radius: clamp(12px, 3vmin, 18px);
      --grid-gap: 18px 14px;
      --grid-columns: 5;
      --page-padding: 0 20px 32px;
      --header-time-size: clamp(42px, 12vw, 52px);
      --header-date-size: clamp(13px, 3vw, 15px);
      --label-font-size: clamp(10px, 2.2vw, 11px);
      --dock-height: clamp(62px, 10vh, 76px);
      --dock-max-width: 440px;
      --search-max-width: 440px;
      --quote-max-width: 440px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --panel-bg: rgba(8, 14, 26, 0.96);
      --panel-border: rgba(255, 255, 255, 0.12);
      --btn-bg: rgba(255, 255, 255, 0.14);
      --btn-hover-bg: rgba(255, 255, 255, 0.22);
      --btn-active-bg: rgba(255, 255, 255, 0.28);
      --primary-gradient: linear-gradient(135deg, #5b8cff, #7c5cff);
      --primary-hover-gradient: linear-gradient(135deg, #6a99ff, #8b6dff);
      --success-color: #48bb78;
      --danger-color: #f56565;
    }
    body {
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .wallpaper {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(94,129,244,.34), transparent 35%),
        radial-gradient(circle at 80% 15%, rgba(62,226,173,.18), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(233,124,255,.18), transparent 35%),
        linear-gradient(180deg, #223352 0%, #132038 42%, #0b1426 100%);
      z-index: 0;
      transition: background 0.3s ease;
    }
    .wallpaper::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.07), rgba(255,255,255,.01) 18%, rgba(0,0,0,.08) 100%);
      pointer-events: none;
    }
    .app-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 var(--safe-right) 0 var(--safe-left);
    }
    .delete-zone {
      position: fixed;
      top: calc(var(--safe-top) + 6px);
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      width: clamp(70px, 12vw, 90px);
      height: clamp(70px, 12vw, 90px);
      border-radius: 50%;
      background: rgba(18, 20, 27, .25);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: transform .28s cubic-bezier(.2,.8,.2,1), opacity .22s ease, background .18s ease, border-color .18s ease;
      box-shadow: 0 16px 34px rgba(0,0,0,.2);
    }
    .delete-zone.active {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .delete-zone.hover {
      background: rgba(214, 46, 46, .86);
      border-color: rgba(255,255,255,.15);
    }
    .delete-zone .iconify {
      font-size: 24px;
    }
    .delete-zone span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .2px;
      text-align: center;
      line-height: 1;
    }
    .top-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--btn-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background .18s ease, transform .15s ease;
      flex-shrink: 0;
    }
    .top-btn:hover {
      background: var(--btn-hover-bg);
    }
    .top-btn:active {
      transform: scale(.95);
    }
    .top-btn .iconify {
      font-size: 18px;
    }
    .top-actions {
      position: absolute;
      top: calc(var(--safe-top) + 12px);
      right: 16px;
      z-index: 20;
      display: none;
    }
    .header-section {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      padding: calc(var(--safe-top) + 12px) 20px 0;
      text-shadow: 0 2px 8px rgba(0,0,0,.22);
      z-index: 5;
    }
    .header-time {
      font-size: var(--header-time-size);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .header-date {
      font-size: var(--header-date-size);
      opacity: .96;
      margin-bottom: 16px;
    }
    .quote-container {
      width: 90%;
      max-width: var(--quote-max-width);
      margin-bottom: 14px;
      min-height: 22px;
    }
    .quote-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }
    .quote-text-wrap {
      flex: 0 1 auto;
      max-width: 85%;
      overflow: hidden;
      position: relative;
    }
    .quote-text {
      color: rgba(255,255,255,.96);
      font-size: 14px;
      line-height: 18px;
      white-space: nowrap;
      display: inline-block;
    }
    .quote-text.scroll {
      animation: quoteScroll 10s linear infinite;
    }
    .quote-text-wrap:hover .quote-text.scroll {
      animation-play-state: paused;
    }
    @keyframes quoteScroll {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(-100%);
      }
    }
    .quote-edit-btn {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      opacity: .82;
      transition: opacity .18s ease;
      flex-shrink: 0;
    }
    .quote-edit-btn:hover {
      opacity: 1;
    }
    .quote-edit-mode {
      display: none;
      width: 100%;
      gap: 8px;
      align-items: center;
    }
    .quote-edit-mode.active {
      display: flex;
    }
    .quote-input {
      flex: 1;
      height: 36px;
      border: none;
      outline: none;
      border-radius: 10px;
      padding: 0 12px;
      background: var(--btn-bg);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 13px;
      border: 1px solid var(--panel-border);
    }
    .quote-input::placeholder {
      color: rgba(255,255,255,.6);
    }
    .quote-action-btn {
      height: 36px;
      border: none;
      outline: none;
      padding: 0 12px;
      border-radius: 10px;
      background: var(--btn-bg);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background .18s ease;
    }
    .quote-action-btn:hover {
      background: var(--btn-hover-bg);
    }
    .search-bar {
      width: 90%;
      max-width: var(--search-max-width);
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      margin-bottom: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      position: relative;
      border: 1px solid var(--panel-border);
    }
    .search-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .search-icon {
      font-size: 18px;
      color: white;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform .18s ease;
    }
    .search-icon:active {
      transform: scale(.92);
    }
    .search-input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: rgba(255,255,255,.95);
      font-size: 14px;
    }
    .search-input::placeholder {
      color: rgba(255,255,255,.72);
    }
    .search-actions {
      display: flex;
      gap: 10px;
      opacity: .95;
      flex-shrink: 0;
    }
    .search-actions .iconify {
      font-size: 17px;
      color: rgba(255,255,255,.92);
    }
    .engine-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
      border-radius: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: all .25s ease;
      overflow: hidden;
      border: 1px solid var(--panel-border);
    }
    .engine-panel.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .engine-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
    }
    .engine-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background .18s ease, transform .15s ease;
      background: transparent;
      position: relative;
    }
    .engine-item:hover {
      background: var(--btn-hover-bg);
      transform: scale(1.05);
    }
    
    .engine-item.add-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.1);
    }
    .engine-item .delete-engine {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(214, 46, 46, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
      cursor: pointer;
    }
    .engine-item:hover .delete-engine {
      opacity: 1;
    }
    .engine-item .delete-engine .iconify {
      font-size: 12px;
    }
    .engine-item .iconify {
      font-size: 22px;
      color: #fff;
      flex-shrink: 0;
    }
    .engine-name {
      font-size: 12px;
      color: #fff;
      text-align: center;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .desktop {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
      perspective: 1200px;
    }
    .pages-container {
      display: flex;
      width: fit-content;
      height: 100%;
      transform: translate3d(0,0,0);
      will-change: transform;
      transition: transform .42s cubic-bezier(.22,.88,.24,1);
    }
    .page {
      width: 100vw;
      height: 100%;
      padding: var(--page-padding);
      display: grid;
      grid-template-columns: repeat(var(--grid-columns), 1fr);
      grid-auto-rows: min-content;
      gap: var(--grid-gap);
      align-content: start;
      justify-items: center;
      position: relative;
      transform-origin: center center;
      transition: opacity .34s ease, transform .42s cubic-bezier(.22,.88,.24,1), filter .34s ease;
      opacity: .72;
      filter: saturate(.88);
      transform: scale(.94) rotateY(9deg);
    }
    .page.page-current {
      opacity: 1;
      filter: saturate(1);
      transform: scale(1) rotateY(0);
    }
    .page.page-prev {
      transform: scale(.965) rotateY(8deg);
    }
    .page.page-next {
      transform: scale(.965) rotateY(-8deg);
    }
    .page.drag-target,
    .dock.drag-target,
    .folder-grid.drag-target {
      outline: 1px solid rgba(255,255,255,.18);
      outline-offset: -1px;
    }
    .app-icon {
      width: var(--icon-size);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
      touch-action: none;
      will-change: transform;
      position: relative;
      transition: transform .2s ease, opacity .2s ease;
    }
    .app-icon:active {
      transform: scale(.96);
    }
    .icon-bg {
      width: var(--icon-size);
      height: var(--icon-size);
      border-radius: var(--icon-radius);
      background: rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 8px 20px rgba(0,0,0,.14),
        inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .18s ease, outline .18s ease, box-shadow .18s ease;
      position: relative;
    }
    .icon-bg .iconify {
      font-size: calc(var(--icon-size) * .6);
      color: #fff;
    }
    .icon-bg img.custom-icon {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }
    .icon-label-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 7px;
    }
    .icon-label {
      color: #fff;
      font-size: var(--label-font-size);
      line-height: 1.25;
      text-shadow: 0 1px 4px rgba(0,0,0,.2);
      white-space: nowrap;
      overflow: visible;
      max-width: none;
      width: auto;
      text-align: center;
      position: static;
      left: auto;
      transform: none;
      margin: 0;
      padding: 0 2px;
    }
    .folder-preview {
      position: absolute;
      inset: 8%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
    }
    .folder-preview-cell {
      border-radius: 6px;
      background: rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .folder-preview-cell .iconify {
      font-size: calc(var(--icon-size) * .22);
    }
    .folder-preview-cell img.custom-icon {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
    .page-indicators {
      position: absolute;
      left: 50%;
      bottom: calc(10px + var(--safe-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 6;
    }
    .indicator-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.36);
      transition: all .25s ease;
      cursor: pointer;
    }
    .indicator-dot.active {
      width: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.96);
    }
    .dock-wrap {
      width: 100%;
      padding: 0 16px calc(12px + var(--safe-bottom));
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 8;
    }
    .dock {
      width: 100%;
      max-width: var(--dock-max-width);
      min-height: var(--dock-height);
      border-radius: 24px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 9px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 12px 28px rgba(0,0,0,.15),
        inset 0 1px 0 rgba(255,255,255,.10);
      position: relative;
      border: 1px solid var(--panel-border);
    }
    .dock .app-icon {
      width: calc(var(--icon-size) * .92);
      flex-shrink: 0;
    }
    .dock .icon-bg {
      width: calc(var(--icon-size) * .92);
      height: calc(var(--icon-size) * .92);
    }
    .dock .icon-label {
      display: none;
    }
    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 4000;
      pointer-events: none;
      will-change: transform;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.28));
    }
    .drag-ghost .app-icon {
      transform: scale(1.06);
    }
    .app-icon.drag-source {
      opacity: .18 !important;
    }
    .app-icon.merge-hover .icon-bg {
      outline: 2px solid rgba(255,255,255,.95);
      outline-offset: 2px;
      transform: scale(1.06);
      box-shadow:
        0 12px 30px rgba(0,0,0,.18),
        0 0 0 8px rgba(255,255,255,.08),
        inset 0 1px 0 rgba(255,255,255,.08);
    }
    .app-icon.merge-hover::after {
      content: "合并到文件夹";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 11px;
      line-height: 1;
      padding: 5px 7px;
      border-radius: 999px;
      background: rgba(0,0,0,.64);
      color: #fff;
    }
    .folder-modal,
    .form-modal,
    .wallpaper-modal,
    .engine-form-modal,
    .sync-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2500;
      padding: 20px;
    }
    .folder-modal.active,
    .form-modal.active,
    .wallpaper-modal.active,
    .engine-form-modal.active,
    .sync-modal.active {
      display: flex;
    }
    .folder-content,
    .form-content,
    .wallpaper-content,
    .engine-form-content,
    .sync-content {
      width: min(560px, 92vw);
      border-radius: 28px;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 18px 40px rgba(0,0,0,.3);
      overflow: hidden;
      border: 1px solid var(--panel-border);
    }
    .folder-content {
      min-height: 320px;
      max-height: 78vh;
      display: flex;
      flex-direction: column;
    }
    .folder-header,
    .form-header,
    .wallpaper-header,
    .engine-form-header,
    .sync-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
      color: #fff;
    }
    .folder-title,
    .form-title,
    .wallpaper-title,
    .engine-form-title,
    .sync-title {
      font-size: 18px;
      font-weight: 600;
    }
    .folder-body {
      padding: 20px;
      overflow: auto;
      flex: 1;
    }
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      min-height: 180px;
      border-radius: 20px;
      padding: 6px;
      position: relative;
    }
    .folder-tip {
      margin-top: 16px;
      text-align: center;
      color: rgba(255,255,255,.78);
      font-size: 12px;
    }
    .context-menu {
      position: fixed;
      min-width: 188px;
      padding: 8px 0;
      border-radius: 16px;
      background: var(--panel-bg);
      color: #fff;
      box-shadow: 0 18px 40px rgba(0,0,0,.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 3500;
      opacity: 0;
      pointer-events: none;
      transform: scale(.96);
      transform-origin: top left;
      transition: opacity .18s ease, transform .18s ease;
      border: 1px solid var(--panel-border);
    }
    .context-menu.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }
    .context-item {
      height: 42px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background .18s ease;
    }
    .context-item:hover {
      background: var(--btn-hover-bg);
    }
    .context-item .iconify {
      font-size: 18px;
    }
    .context-item.danger {
      color: #ff6b6b;
    }
    .context-divider {
      height: 1px;
      margin: 6px 0;
      background: var(--panel-border);
    }
    .form-body, .wallpaper-body, .engine-form-body, .sync-body {
      padding: 18px;
    }
    .form-row {
      margin-bottom: 14px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      opacity: .92;
    }
    .form-input, .form-select {
      width: 100%;
      height: 42px;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 0 14px;
      background: var(--btn-bg);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
    }
    .form-input::placeholder {
      color: rgba(255,255,255,.6);
    }
    .icon-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .icon-input-row .form-input {
      flex: 1;
    }
    .icon-select-btn {
      height: 42px;
      min-width: 42px;

      border-radius: 14px;
      background: var(--btn-bg);

      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s ease;
      flex-shrink: 0;
    }
    .icon-select-btn:hover {

    }
    .icon-select-btn .iconify {
      font-size: 18px;
    }
    .file-input-wrapper {
      position: relative;
      width: 100%;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }
    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 42px;
      border-radius: 14px;
      background: var(--btn-bg);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px dashed var(--panel-border);
      transition: background .18s ease, border-color .18s ease;
    }
    .file-input-label:hover {
      background: var(--btn-hover-bg);
      border-color: rgba(255,255,255,.2);
    }
    .file-input-label .iconify {
      font-size: 16px;
    }
    .form-preview {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: var(--btn-bg);
      border: 1px solid var(--panel-border);
    }
    .form-preview-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.12);
      overflow: hidden;
      flex-shrink: 0;
    }
    .form-preview-icon .iconify {
      font-size: 30px;
      color: #fff;
    }
    .form-preview-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
    .form-preview-name {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }
    .form-preview-link {
      font-size: 12px;
      color: rgba(255,255,255,.7);
      margin-top: 2px;
    }
    .form-actions, .wallpaper-actions, .engine-form-actions, .sync-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px 18px;
    }
    .form-btn {
      min-width: 84px;
      height: 40px;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 0 16px;
      cursor: pointer;
      color: #fff;
      background: var(--btn-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background .18s ease, transform .15s ease;
      font-size: 14px;
    }
    .form-btn:hover {
      background: var(--btn-hover-bg);
    }
    .form-btn:active {
      transform: scale(.98);
    }
    .form-btn.primary {
      background: var(--primary-gradient);
    }
    .form-btn.primary:hover {
      background: var(--primary-hover-gradient);
    }
    .form-btn.success {
      background: linear-gradient(135deg, var(--success-color), #38a169);
    }
    .form-btn.danger {
      background: linear-gradient(135deg, var(--danger-color), #c53030);
    }
    .wallpaper-file-input {
      margin-bottom: 14px;
    }
    .search-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(76,140,200,0.8) 0%, rgba(120,180,220,0.6) 40%, rgba(200,180,120,0.6) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 2000;
      display: none;
      flex-direction: column;
      padding: 0 var(--safe-right) 0 var(--safe-left);
      transition: opacity .25s ease, transform .25s ease;
      opacity: 0;
      transform: translateY(20px);
    }
    .search-screen.active {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }
    .search-screen-header {
      width: 100%;
      padding: calc(var(--safe-top) + 12px) 20px 0;
      flex-shrink: 0;
      position: relative;
    }
    .search-screen-bar {
      width: 100%;
      max-width: none;
      margin: 0;
    }
    .search-close-btn {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0);
      padding: 0;
    }
    .search-engine-panel {
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
    }
    .search-screen-body {
      flex: 1;
      width: 100%;
      padding: 20px;
      overflow-y: auto;
      position: relative;
    }
    .suggest-list-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .suggest-section-title {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
      padding-left: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .suggest-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    /* 修复: 左右图标完美对称 + 文本对齐 */
    .suggest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all .2s ease;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .suggest-item:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.2);
      transform: translateX(4px);
    }
    /* 统一左右图标尺寸，保证对称 */
    .suggest-item .iconify {
      font-size: 20px;
      flex-shrink: 0;
      color: rgba(255,255,255,.85);
    }
    .suggest-text {
      font-size: 15px;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      letter-spacing: 0.2px;
    }
    .suggest-arrow {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s ease;  
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }
    .suggest-arrow:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.02);
    }
    .suggest-arrow .iconify {
      font-size: 18px;
      pointer-events: none;
    }
    .suggest-empty {
      text-align: center;
      color: rgba(255,255,255,0.5);
      padding: 40px 20px;
      font-size: 14px;
    }
    .suggest-history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-left: 8px;
    }
    .suggest-clear-history {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all .2s;
    }
    .suggest-clear-history:hover {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.1);
    }
    .__xs_toast__ {
      position: fixed;
      left: 50%;
      bottom: calc(100px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      background: var(--panel-bg);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 99999;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    .sync-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--panel-border);
    }
    .sync-status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--btn-bg);
    }
    .sync-status-icon.success {
      background: rgba(72, 187, 120, 0.2);
      color: var(--success-color);
    }
    .sync-status-icon.error {
      background: rgba(245, 101, 101, 0.2);
      color: var(--danger-color);
    }
    .sync-status-text {
      flex: 1;
    }
    .sync-status-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .sync-status-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }
    .sync-interval-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px 0;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sync-interval-label {
      font-weight: 600;
      color: #fff;
      font-size: 14px;
    }
    .sync-interval-select {
      width: 120px;
      height: 36px;
      border-radius: 10px;
      background: var(--btn-bg);
      color: #fff;
      border: 1px solid var(--panel-border);
      font-size: 14px;
      padding: 0 10px;
      cursor: pointer;
      outline: none;
    }
    .sync-interval-select option {
      background: var(--panel-bg);
      color: #fff;
    }
    .last-sync-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: 10px;
    }
    .next-sync-info {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 4px;
    }
    
    .app-icon img,
    .folder-preview-cell img,
    .form-preview-icon img {
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-touch-callout: none;
      pointer-events: none;
    }
    .app-icon .icon-bg,
    .folder-preview-cell,
    .form-preview-icon {
      pointer-events: auto; 
    }
    @media (min-width: 768px) {
      :root {
        --dock-max-width: 620px;
      }
      .header-section {
        padding-top: 22px;
      }
      .search-bar {
        height: 44px;
      }
      .folder-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .engine-list {
        grid-template-columns: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wallpaper" id="wallpaperRoot"></div>
  <div class="delete-zone" id="deleteZone">
    <span class="iconify" data-icon="mdi:trash-can-outline"></span>
    <span>删除</span>
  </div>
  <div class="app-shell">
    <div class="top-actions"></div>
    <div class="header-section">
      <div class="header-time" id="bigTime">00:00</div>
      <div class="header-date" id="headerDate">1月1日 星期一</div>
      <div class="quote-container">
        <div class="quote-display" id="quoteDisplayWrap">
          <div class="quote-text-wrap">
            <div class="quote-text" id="quoteDisplay">生活不是等待风暴过去，而是学会在雨中跳舞。</div>
          </div>
          <span class="quote-edit-btn" onclick="editQuote()">
            <span class="iconify" data-icon="mdi:pencil-outline"></span>
          </span>
        </div>
        <div class="quote-edit-mode" id="quoteEditMode">
          <input id="quoteInput" class="quote-input" type="text" placeholder="输入每日一言" maxlength="100" />
          <button class="quote-action-btn" onclick="saveQuote()">保存</button>
          <button class="quote-action-btn" onclick="cancelQuoteEdit()">取消</button>
        </div>
      </div>
      <div class="search-bar">
        <div class="search-left">
          <span class="search-icon iconify" id="engineIcon" data-icon="simple-icons:baidu" onclick="toggleEnginePanel()"></span>
          <input id="searchInput" class="search-input" type="search" placeholder="搜索或输入网址后回车" />
        </div>
        <div class="search-actions">
          <span class="iconify" data-icon="mdi:microphone-outline"></span>
          <span class="iconify" data-icon="mdi:camera-outline"></span>
        </div>
        <div class="engine-panel" id="enginePanel">
          <div class="engine-list" id="engineList"></div>
        </div>
      </div>
    </div>
    <div class="desktop" id="desktop">
      <div class="pages-container" id="pagesContainer"></div>
      <div class="page-indicators" id="pageIndicators"></div>
    </div>
    <div class="dock-wrap">
      <div class="dock" id="dock"></div>
    </div>
  </div>
  <div class="search-screen" id="searchScreen">
    <div class="search-screen-header">
      <div class="search-bar search-screen-bar">
        <div class="search-left">
          <span class="search-icon iconify" id="searchScreenEngineIcon" data-icon="simple-icons:baidu" onclick="toggleSearchScreenEnginePanel()"></span>
          <input id="searchScreenInput" class="search-input" type="search" placeholder="搜索或输入网址后回车" />
        </div>
        <div class="search-actions">
          <button class="top-btn search-close-btn" id="searchCloseBtn" onclick="closeSearchScreen()">
            <span class="iconify" data-icon="ep:back"></span>
          </button>
        </div>
      </div>
      <div class="engine-panel search-engine-panel" id="searchScreenEnginePanel">
        <div class="engine-list" id="searchScreenEngineList"></div>
      </div>
    </div>
    <div class="search-screen-body" id="searchScreenBody">
    </div>
  </div>

  <!-- 修复1：所有弹窗仅点击遮罩层自身才关闭 -->
  <div class="folder-modal" id="folderModal" onclick="event.target === this && closeFolder()">
    <div class="folder-content" onclick="event.stopPropagation()">
      <div class="folder-header">
        <div class="folder-title" id="folderTitle">文件夹</div>
        <button class="top-btn" onclick="closeFolder()">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="folder-body">
        <div class="folder-grid" id="folderGrid"></div>
        <div class="folder-tip" id="folderEmpty">文件夹为空</div>
      </div>
    </div>
  </div>
  <div class="context-menu" id="contextMenu">
    <div class="context-item" id="ctxOpen">
      <span class="iconify" data-icon="mdi:open-in-app"></span>
      <span>打开</span>
    </div>
    <div class="context-item" id="ctxEdit">
      <span class="iconify" data-icon="mdi:pencil-outline"></span>
      <span>编辑</span>
    </div>
    <div class="context-item" id="ctxAdd">
      <span class="iconify" data-icon="mdi:plus-circle-outline"></span>
      <span>添加</span>
    </div>
    <div class="context-divider"></div>
    <div class="context-item" id="ctxWallpaper">
      <span class="iconify" data-icon="mdi:wallpaper"></span>
      <span>背景设置</span>
    </div>
    <div class="context-divider"></div>
    <div class="context-item danger" id="ctxDelete">
      <span class="iconify" data-icon="mdi:delete-outline"></span>
      <span>删除</span>
    </div>
  </div>
  <div class="form-modal" id="formModal" onclick="event.target === this && closeFormModal()">
    <div class="form-content" onclick="event.stopPropagation()">
      <div class="form-header">
        <div class="form-title" id="formTitle">添加应用</div>
        <button class="top-btn" onclick="closeFormModal()">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="form-body">
        <div class="form-row">
          <label class="form-label">名称</label>
          <input id="formName" class="form-input" />
        </div>
        <div class="form-row" id="formUrlRow">
          <label class="form-label">应用链接</label>
          <input id="formUrl" class="form-input" />
        </div>
        <div class="form-row" id="formIconRow">
          <label class="form-label">图标链接 / Iconify</label>
          <div class="icon-input-row">
            <input id="formIcon" class="form-input" />
            <button class="icon-select-btn" id="iconSelectBtn" title="选择本地图片">
              <span class="iconify" data-icon="mdi:image-outline"></span>
            </button>
            <input type="file" id="iconFileInput" accept="image/*" style="display: none;" />
          </div>
        </div>
        <div class="form-preview">
          <div class="form-preview-icon" id="formPreviewIcon"></div>
          <div class="form-preview-text">
            <div class="form-preview-name" id="formPreviewName"></div>
            <div class="form-preview-link" id="formPreviewLink"></div>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="form-btn" onclick="closeFormModal()">取消</button>
        <button class="form-btn primary" id="formSaveBtn">保存</button>
      </div>
    </div>
  </div>
  <div class="engine-form-modal" id="engineFormModal" onclick="event.target === this && closeEngineFormModal()">
    <div class="engine-form-content" onclick="event.stopPropagation()">
      <div class="engine-form-header">
        <div class="engine-form-title" id="engineFormTitle">添加搜索引擎</div>
        <button class="top-btn" onclick="closeEngineFormModal()">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="engine-form-body">
        <div class="form-row">
          <label class="form-label">引擎名称</label>
          <input id="engineFormName" class="form-input" placeholder="例如：搜狗" />
        </div>
        <div class="form-row">
          <label class="form-label">图标 (Iconify标识，如 simple-icons:google)</label>
          <input id="engineFormIcon" class="form-input" placeholder="simple-icons:google" />
        </div>
        <div class="form-row">
          <label class="form-label">搜索URL (使用%s代替搜索词)</label>
          <input id="engineFormUrl" class="form-input" placeholder="https://www.example.com/search?q=%s" />
        </div>
        <div class="form-row">
          <label class="form-label">示例：https://www.google.com/search?q=%s</label>
        </div>
      </div>
      <div class="engine-form-actions">
        <button class="form-btn" onclick="closeEngineFormModal()">取消</button>
        <button class="form-btn primary" onclick="saveCustomEngine()">保存</button>
      </div>
    </div>
  </div>
  <div class="sync-modal" id="syncModal" onclick="event.target === this && closeSyncModal()">
    <div class="sync-content" onclick="event.stopPropagation()">
      <div class="sync-header">
        <div class="sync-title">
          <span class="iconify" data-icon="mdi:cloud-sync" style="margin-right: 8px;"></span>
          云同步设置
        </div>
        <button class="top-btn" onclick="closeSyncModal()">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="sync-body">
        <div class="sync-status" id="syncStatus">
          <div class="sync-status-icon" id="syncStatusIcon">
            <span class="iconify" data-icon="mdi:cloud-off-outline"></span>
          </div>
          <div class="sync-status-text">
            <div class="sync-status-title" id="syncStatusTitle">未配置同步</div>
            <div class="sync-status-desc" id="syncStatusDesc">设置GitHub令牌以启用云同步</div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">GitHub 个人访问令牌 (Token)</label>
          <input type="password" id="githubToken" class="form-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
        </div>
        <div class="form-row">
          <label class="form-label">仓库名称 (例如: my-desktop-data)</label>
          <input type="text" id="githubRepo" class="form-input" placeholder="输入仓库名" />
        </div>
        <div class="form-row">
          <label class="form-label">数据文件名</label>
          <input type="text" id="githubFileName" class="form-input" value="desktop_backup.json" readonly style="opacity: 0.7;" />
        </div>
        <div class="sync-interval-row">
          <span class="sync-interval-label">自动同步间隔</span>
          <select id="syncIntervalSelect" class="sync-interval-select">
            <option value="0">关闭</option>
            <option value="1">每1天</option>
            <option value="2">每2天</option>
            <option value="3">每3天</option>
            <option value="4">每4天</option>
            <option value="5">每5天</option>
            <option value="6">每6天</option>
            <option value="7">每7天</option>
          </select>
        </div>
        <div class="form-row" style="display: flex; gap: 10px;">
          <button class="form-btn success" style="flex: 1;" onclick="manualPushToGithub()">
            <span class="iconify" data-icon="mdi:cloud-upload" style="margin-right: 4px;"></span>
            上传到云端
          </button>
          <button class="form-btn primary" style="flex: 1;" onclick="manualPullFromGithub()">
            <span class="iconify" data-icon="mdi:cloud-download" style="margin-right: 4px;"></span>
            从云端恢复
          </button>
        </div>
        <div style="margin-top: 15px; text-align: center;">
          <button class="form-btn" style="width: 100%;" onclick="testGithubConnection()">
            <span class="iconify" data-icon="mdi:connection" style="margin-right: 4px;"></span>
            测试连接
          </button>
        </div>
        <div class="last-sync-info" id="lastSyncInfo"></div>
        <div class="next-sync-info" id="nextSyncInfo"></div>
      </div>
    </div>
  </div>
  <div class="wallpaper-modal" id="wallpaperModal" onclick="event.target === this && closeWallpaperModal()">
    <div class="wallpaper-content" onclick="event.stopPropagation()">
      <div class="wallpaper-header">
        <div class="wallpaper-title">自定义壁纸</div>
        <button class="top-btn" onclick="closeWallpaperModal()">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="wallpaper-body">
